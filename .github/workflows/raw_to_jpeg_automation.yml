name: Automatisaton raw to jpeg

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # garder la possibilité de la déclencher manuellement dans github

jobs:
  badia_automation_raw_to_jpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_raw_to_jpeg.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_raw_to_jpeg.txt
      - name: Where am I
        run: |
          pwd
          ls -la
          pip list
